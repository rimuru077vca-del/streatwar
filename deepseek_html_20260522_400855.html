<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StreetWear Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: white;
            padding: 20px;
        }

        /* container principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* cabeçalho minimalista */
        .topo {
            text-align: center;
            padding: 30px 0 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 14px;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #888;
            display: block;
            font-weight: normal;
            letter-spacing: 0;
        }

        /* banner simples e moderno */
        .banner {
            background: linear-gradient(145deg, #0c0c0c, #121212);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .banner h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .banner p {
            color: #aaa;
            font-size: 15px;
        }

        /* grade de produtos - simples e responsiva */
        .produtos-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* card único - cada produto é um card separado, fácil de copiar/colar */
        .card {
            background: #0f0f0f;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            gap: 20px;
            padding: 16px;
            border: 1px solid #1f1f1f;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: #333;
            background: #141414;
        }

        /* imagem do produto */
        .card-imagem {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            background: #1a1a1a;
            flex-shrink: 0;
        }

        /* informações */
        .card-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-nome {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-preco {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin: 8px 0;
        }

        .btn-comprar {
            background: white;
            color: black;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: fit-content;
            transition: 0.2s;
        }

        .btn-comprar:hover {
            background: #e0e0e0;
            transform: scale(0.97);
        }

        /* responsivo: no celular o card fica empilhado verticalmente */
        @media (max-width: 550px) {
            .card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .card-imagem {
                width: 180px;
                height: 180px;
            }

            .btn-comprar {
                width: 100%;
                justify-content: center;
            }
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #555;
            font-size: 12px;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- LOGO TOPO -->
    <div class="topo">
        <div class="logo">
            STREETWEAR
            <span>@seudivulgo • anime & street style</span>
        </div>
    </div>

    <!-- BANNER MODERNO -->
    <div class="banner">
        <h1>🛹 Drops exclusivos</h1>
        <p>Compre pelos links abaixo e garanta seu estilo • frete rápido</p>
    </div>

    <!-- ============================================= -->
    <!-- ÁREA DOS PRODUTOS - FÁCIL DE EDITAR! -->
    <!-- ============================================= -->
    <!-- 
        INSTRUÇÕES: 
        Para adicionar um novo produto, COPIE o bloco <div class="card"> ... </div> inteiro 
        e cole logo abaixo, depois altere:
        - src="URL_DA_SUA_IMAGEM"
        - Nome do produto
        - Preço
        - href="SEU_LINK_DE_AFILIADO"
    -->
    
    <div class="produtos-grid">
        
        <!-- PRODUTO 1 -->
        <div class="card">
            <img class="card-imagem" src="https://down-br.img.susercontent.com/file/br-11134207-820mf-mm584za5wp3a34@resize_w450_nl.webp" alt="camiseta">
            <div class="card-info">
                <div class="card-nome">Camiseta jujutsu Kaisen Ryomen Sukuna Streetwear 100% algodão premium confortáve + brinde bonel</div>
                <div class="card-preco">R$28,61</div>
                <a href="https://sualink.com/produto1" target="_blank" class="btn-comprar">Comprar agora →</a>
            </div>
        </div>

    </div>

    <div class="footer">
        🔗 Links oficiais • Parceria afiliado
    </div>
</div>

</body>
</html>
